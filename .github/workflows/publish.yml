name: Publish to npm

on:
  push:
    tags: ['@rymi/mcp@*', 'mcp-v*']

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Rewrite workspace deps for publish
        run: node scripts/prepare-publish.mjs

      - name: Verify prebuilt artifact exists
        run: test -f dist/index.js && test -f dist/index.d.ts

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
